name: Compilación Ultra Rápida (IA Optimized)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Herramientas de Compilación
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git python3 python3-dev python3-pip unzip zlib1g-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake
          pip install --upgrade buildozer cython==0.29.33 virtualenv

      - name: Compilar APK (Solo 64 bits - Máxima Velocidad)
        run: |
          # GLM5/Qwen Optimization: Pre-accept licenses and build only one arch
          yes | buildozer android debug

      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: SuperIA-APK
          path: bin/*.apk
