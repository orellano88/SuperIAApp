name: Compilación Blindada

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compilar con Buildozer Action (Versión Estable)
        uses: AndreMiras/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.10
          command: buildozer android debug
          repository_root: .

      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: SuperIA-APK
          path: bin/*.apk
