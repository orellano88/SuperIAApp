name: Compilación Definitiva (Kivy Official)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build con Buildozer (Official Action)
        uses: kivy/buildozer-action@v1
        with:
          save_buildozer_cache: true
          command: buildozer android debug

      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: SuperIA-APK
          path: bin/*.apk
