name: Compilación Ultra Rápida (IA Optimized)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build con Docker (Qwen/GLM5 Optimized)
        uses: Artemiy-Anagnostou/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.9
          command: buildozer android debug
          repository_root: .

      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: SuperIA-APK
          path: bin/*.apk
