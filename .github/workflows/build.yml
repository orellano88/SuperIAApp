name: Build IA Tributaria (Docker)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with Docker (Kivy Official Container)
        run: |
          # Qwen/GLM5: Usar el contenedor oficial de Kivy que ya tiene todas las librerías 32/64 bits listas.
          docker run --rm --volume "${{ github.workspace }}:/home/user/hostcwd" kivy/buildozer:latest android debug
          
      - name: Upload APK Final
        uses: actions/upload-artifact@v4
        with:
          name: IA_Tributaria_APK
          path: bin/*.apk
