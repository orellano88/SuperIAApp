name: Build Final

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install buildozer cython
          yes | buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: SuperIA-APK
          path: bin/*.apk
