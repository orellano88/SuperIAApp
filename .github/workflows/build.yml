name: Build APK Standard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Dependencias Mínimas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git python3-pip unzip zlib1g-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake
          pip install --upgrade buildozer cython virtualenv

      - name: Compilar APK
        run: |
          # Solo lo estrictamente necesario
          yes | buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: SuperIA-APK
          path: bin/*.apk
